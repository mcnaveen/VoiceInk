# Builds the same unsigned Debug .app as `make local`, zips it, then either:
# - attaches the zip to a GitHub Release when you publish one, or
# - stores the zip as a downloadable Actions artifact when you run the workflow manually.
name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      artifact_label:
        description: "Zip base name suffix (VoiceInk-<label>.zip). Leave empty for manual-<run_number>."
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  build-macos:
    # macos-15+ images ship multiple Xcodes; default is often 16.x (Swift 6.1). LLMKit requires Swift tools 6.2+.
    runs-on: macos-15
    # First run may clone + build whisper.xcframework (often 30–90+ minutes); cache makes later runs much faster.
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (Swift 6.2+ for LLMKit SPM)
        run: |
          for app in Xcode_26.3.app Xcode_26.2.app Xcode_26.1.1.app; do
            dev="/Applications/$app/Contents/Developer"
            if [ -d "$dev" ]; then
              echo "Using $dev"
              sudo xcode-select -s "$dev"
              exit 0
            fi
          done
          echo "No Xcode 26.x found under /Applications"; ls /Applications/Xcode*.app || true
          exit 1

      - name: Xcode and Swift toolchain
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Cache whisper.xcframework build
        uses: actions/cache@v4
        with:
          path: ~/VoiceInk-Dependencies
          key: ${{ runner.os }}-voiceink-whisper-${{ hashFiles('Makefile') }}
          restore-keys: |
            ${{ runner.os }}-voiceink-whisper-

      - name: Build (same as make local → dist/)
        run: make ci-release

      - name: Zip VoiceInk.app
        run: |
          set -euo pipefail
          case "${{ github.event_name }}" in
            release)
              LABEL="${{ github.event.release.tag_name }}"
              ;;
            workflow_dispatch)
              LABEL="${{ github.event.inputs.artifact_label }}"
              if [ -z "$LABEL" ]; then LABEL="manual-${{ github.run_number }}"; fi
              ;;
            *)
              LABEL="manual-${{ github.run_number }}"
              ;;
          esac
          echo "LABEL=$LABEL" >> "$GITHUB_ENV"
          cd dist
          ditto -c -k --sequesterRsrc --keepParent VoiceInk.app "VoiceInk-${LABEL}.zip"
          shasum -a 256 "VoiceInk-${LABEL}.zip" | tee "VoiceInk-${LABEL}.zip.sha256"

      - name: Upload release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/VoiceInk-${{ env.LABEL }}.zip
            dist/VoiceInk-${{ env.LABEL }}.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workflow artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: VoiceInk-${{ env.LABEL }}
          path: |
            dist/VoiceInk-${{ env.LABEL }}.zip
            dist/VoiceInk-${{ env.LABEL }}.zip.sha256
          if-no-files-found: error
